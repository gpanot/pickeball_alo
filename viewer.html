<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Courts - Vietnam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --acid: #C8F135;
    --dark: #0D0D0D;
    --mid: #1A1A1A;
    --panel: #111;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #666;
    --orange: #FF5B1F;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--acid);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--orange); }

  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: var(--muted);
  }

  .stat-val {
    color: var(--acid);
    font-weight: 700;
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 360px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--panel);
    overflow: hidden;
  }

  .search-bar {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .search-bar input {
    flex: 1;
    background: var(--mid);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    outline: none;
    border-radius: 2px;
  }

  .search-bar input:focus { border-color: var(--acid); }

  .sort-select {
    background: var(--mid);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    outline: none;
    cursor: pointer;
    border-radius: 2px;
  }

  .venue-list {
    overflow-y: auto;
    flex: 1;
  }

  .venue-list::-webkit-scrollbar { width: 4px; }
  .venue-list::-webkit-scrollbar-track { background: var(--dark); }
  .venue-list::-webkit-scrollbar-thumb { background: var(--border); }

  .venue-card {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .venue-card:hover { background: var(--mid); }
  .venue-card.active {
    background: var(--mid);
    border-left: 3px solid var(--acid);
  }

  .venue-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .venue-address {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .price-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .badge {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 2px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .badge-price {
    background: rgba(200, 241, 53, 0.12);
    color: var(--acid);
    border: 1px solid rgba(200, 241, 53, 0.2);
  }

  .badge-promo {
    background: rgba(255, 91, 31, 0.12);
    color: var(--orange);
    border: 1px solid rgba(255, 91, 31, 0.2);
  }

  .venue-link {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 10px;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .venue-link:hover {
    color: var(--acid);
    border-color: var(--acid);
  }

  /* MAP AREA */
  .map-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #map {
    flex: 1;
    background: #181818;
  }

  /* DETAIL PANEL */
  .detail-panel {
    height: 220px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    overflow-y: auto;
    padding: 16px 20px;
    flex-shrink: 0;
    display: none;
  }

  .detail-panel.open { display: block; }

  .detail-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .detail-addr {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .pricing-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    margin-bottom: 10px;
  }

  .pricing-table th {
    background: var(--mid);
    color: var(--acid);
    text-align: left;
    padding: 5px 10px;
    font-size: 10px;
    letter-spacing: 0.5px;
    border: 1px solid var(--border);
  }

  .pricing-table td {
    padding: 5px 10px;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .pricing-table tr:hover td { background: var(--mid); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }

  .empty-icon { font-size: 40px; opacity: 0.3; }

  /* FILE UPLOAD */
  .upload-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(4px);
  }

  .upload-box {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
  }

  .upload-box h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--acid);
    margin-bottom: 8px;
  }

  .upload-box p {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .upload-btn {
    display: inline-block;
    background: var(--acid);
    color: var(--dark);
    padding: 12px 28px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    border: none;
    letter-spacing: 0.5px;
    transition: opacity 0.15s;
  }

  .upload-btn:hover { opacity: 0.85; }

  .demo-btn {
    margin-top: 14px;
    display: block;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
  }

  #fileInput { display: none; }
</style>
<!-- Leaflet for map -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</head>
<body>

<!-- Upload overlay -->
<div class="upload-overlay" id="uploadOverlay">
  <div class="upload-box">
    <h2>COURT<span style="color:var(--orange)">MAP</span></h2>
    <p>Load the courts.json file generated by the scraper to visualize pickleball venues on the map with pricing details.</p>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Load courts.json</button>
    <input type="file" id="fileInput" accept=".json">
    <span class="demo-btn" onclick="loadDemo()">or load demo data</span>
  </div>
</div>

<header>
  <div class="logo">COURT<span>MAP</span></div>
  <div style="font-size:10px; color:var(--muted)">Pickleball venues / Vietnam</div>
  <div class="header-stats">
    <div>VENUES <span class="stat-val" id="totalCount">0</span></div>
    <div>SHOWN <span class="stat-val" id="shownCount">0</span></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search name or district..." oninput="filterVenues()">
      <select class="sort-select" id="sortSelect" onchange="filterVenues()">
        <option value="name">A-Z</option>
        <option value="price_asc">Price low</option>
        <option value="price_desc">Price high</option>
      </select>
    </div>
    <div class="venue-list" id="venueList">
      <div class="empty-state">
        <div class="empty-icon">🏓</div>
        <div>Load courts.json to get started</div>
      </div>
    </div>
  </div>

  <div class="map-area">
    <div id="map"></div>
    <div class="detail-panel" id="detailPanel"></div>
  </div>
</div>

<script>
let allVenues = [];
let filteredVenues = [];
let map, markers = {};
let activeCard = null;

// Init map centered on Ho Chi Minh City
map = L.map('map', { zoomControl: true }).setView([10.776, 106.700], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; CartoDB',
  maxZoom: 19
}).addTo(map);

// Custom marker icon
function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:28px; height:28px;
      background:${color};
      border:2px solid #000;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      box-shadow:0 2px 8px rgba(0,0,0,0.5);
    "></div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 28],
    popupAnchor: [0, -28]
  });
}

// Extract min price from venue data
function getMinPrice(venue) {
  let min = Infinity;
  const priceRe = /(\d[\d.,]+)\s*(?:đ|VND|vnđ|₫)/gi;
  const text = JSON.stringify(venue);
  let match;
  while ((match = priceRe.exec(text)) !== null) {
    const val = parseFloat(match[1].replace(/[.,]/g, ''));
    if (val > 10000 && val < 10000000) min = Math.min(min, val);
  }
  return min === Infinity ? null : min;
}

function formatPrice(p) {
  if (!p) return '';
  return (p / 1000).toFixed(0) + 'k';
}

function priceColor(p) {
  if (!p) return '#666';
  if (p <= 80000) return '#C8F135';
  if (p <= 120000) return '#FFD700';
  return '#FF5B1F';
}

// Geocode: try to extract lat/lng from address using known HCM districts
const DISTRICT_COORDS = {
  'tân phú': [10.788, 106.628], 'tan phu': [10.788, 106.628],
  'bình thạnh': [10.812, 106.712], 'binh thanh': [10.812, 106.712],
  'quận 1': [10.776, 106.702], 'district 1': [10.776, 106.702],
  'quận 2': [10.786, 106.742], 'thủ đức': [10.850, 106.757],
  'quận 3': [10.779, 106.690], 'quận 4': [10.760, 106.702],
  'quận 5': [10.754, 106.672], 'quận 6': [10.748, 106.638],
  'quận 7': [10.730, 106.718], 'phú nhuận': [10.800, 106.685],
  'quận 10': [10.773, 106.668], 'quận 11': [10.763, 106.651],
  'quận 12': [10.868, 106.654], 'gò vấp': [10.838, 106.673],
  'bình dương': [10.970, 106.650], 'đồng nai': [10.950, 107.000],
  'hà nội': [21.028, 105.834], 'ha noi': [21.028, 105.834],
  'đà nẵng': [16.054, 108.202], 'da nang': [16.054, 108.202],
};

function guessCoords(address) {
  if (!address) return null;
  const lower = address.toLowerCase();
  for (const [key, coords] of Object.entries(DISTRICT_COORDS)) {
    if (lower.includes(key)) {
      // Add small jitter so markers don't stack
      return [coords[0] + (Math.random() - 0.5) * 0.005, coords[1] + (Math.random() - 0.5) * 0.005];
    }
  }
  return null;
}

function loadVenues(data) {
  allVenues = data.map((v, i) => ({
    ...v,
    id: i,
    minPrice: getMinPrice(v),
    coords: guessCoords(v.address)
  }));
  document.getElementById('uploadOverlay').style.display = 'none';
  document.getElementById('totalCount').textContent = allVenues.length;
  filterVenues();
}

function filterVenues() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  filteredVenues = allVenues.filter(v =>
    (v.name || '').toLowerCase().includes(q) ||
    (v.address || '').toLowerCase().includes(q)
  );

  filteredVenues.sort((a, b) => {
    if (sort === 'name') return (a.name || '').localeCompare(b.name || '');
    if (sort === 'price_asc') return (a.minPrice || Infinity) - (b.minPrice || Infinity);
    if (sort === 'price_desc') return (b.minPrice || -Infinity) - (a.minPrice || -Infinity);
    return 0;
  });

  document.getElementById('shownCount').textContent = filteredVenues.length;
  renderList();
  renderMarkers();
}

function renderList() {
  const list = document.getElementById('venueList');
  if (!filteredVenues.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>No venues match</div></div>';
    return;
  }
  list.innerHTML = filteredVenues.map(v => `
    <div class="venue-card" id="card-${v.id}" onclick="selectVenue(${v.id})">
      <a class="venue-link" href="${v.url}" target="_blank">BOOK</a>
      <div class="venue-name">${v.name || 'Unnamed Venue'}</div>
      <div class="venue-address">${v.address || 'Address unknown'}</div>
      <div class="price-badges">
        ${v.minPrice ? `<span class="badge badge-price">from ${formatPrice(v.minPrice)}</span>` : ''}
        ${(v.promotions || []).length ? `<span class="badge badge-promo">PROMO</span>` : ''}
        ${!v.coords ? `<span class="badge" style="background:rgba(255,255,255,0.05);color:#555;border:1px solid #333">no GPS</span>` : ''}
      </div>
    </div>
  `).join('');
}

function renderMarkers() {
  // Clear old markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  filteredVenues.forEach(v => {
    if (!v.coords) return;
    const color = priceColor(v.minPrice);
    const marker = L.marker(v.coords, { icon: makeIcon(color) }).addTo(map);
    marker.bindPopup(`
      <div style="font-family:monospace;font-size:12px;min-width:180px">
        <b>${v.name || 'Venue'}</b><br>
        <span style="color:#999;font-size:10px">${v.address || ''}</span><br>
        ${v.minPrice ? `<span style="color:${color};font-weight:bold">From ${formatPrice(v.minPrice)}/hr</span>` : ''}
        ${(v.promotions || []).length ? `<br><span style="color:#FF5B1F;font-size:10px">${v.promotions[0]}</span>` : ''}
        <br><a href="${v.url}" target="_blank" style="color:#C8F135;font-size:10px">Book now</a>
      </div>
    `);
    marker.on('click', () => selectVenue(v.id));
    markers[v.id] = marker;
  });
}

function selectVenue(id) {
  const venue = allVenues.find(v => v.id === id);
  if (!venue) return;

  // Highlight card
  if (activeCard) {
    const prev = document.getElementById(`card-${activeCard}`);
    if (prev) prev.classList.remove('active');
  }
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  activeCard = id;

  // Pan map
  if (venue.coords && markers[id]) {
    map.panTo(venue.coords);
    markers[id].openPopup();
  }

  // Show detail panel
  showDetail(venue);
}

function showDetail(venue) {
  const panel = document.getElementById('detailPanel');
  panel.classList.add('open');

  let tablesHtml = '';
  if (venue.pricing_tables && venue.pricing_tables.length) {
    venue.pricing_tables.forEach(table => {
      if (!table.length) return;
      const headers = table[0];
      const rows = table.slice(1);
      tablesHtml += `
        <table class="pricing-table">
          <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>`;
    });
  } else if (venue.flat_prices && venue.flat_prices.length) {
    tablesHtml = venue.flat_prices.map(p => `<div style="font-size:11px;color:#aaa;margin-bottom:4px">${p}</div>`).join('');
  } else {
    tablesHtml = '<div style="font-size:11px;color:#555">No pricing data extracted. Click BOOK to view on site.</div>';
  }

  const promos = (venue.promotions || []).map(p =>
    `<div style="font-size:10px;color:var(--orange);margin-top:4px">🎁 ${p}</div>`
  ).join('');

  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px">
      <div>
        <div class="detail-title">${venue.name || 'Venue'}</div>
        <div class="detail-addr">${venue.address || 'Address not found'}</div>
      </div>
      <a href="${venue.url}" target="_blank" style="
        background:var(--acid);color:var(--dark);padding:8px 16px;
        font-family:monospace;font-size:11px;font-weight:700;text-decoration:none;
        flex-shrink:0;margin-left:16px;
      ">BOOK NOW</a>
    </div>
    ${tablesHtml}
    ${promos}
  `;
}

// File input handler
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      loadVenues(Array.isArray(data) ? data : [data]);
    } catch {
      alert('Invalid JSON file. Make sure to load courts.json from the scraper.');
    }
  };
  reader.readAsText(file);
});

// Demo data
function loadDemo() {
  const demo = [
    {
      name: "CLB Pickleball Tân Phú",
      address: "123 Lũy Bán Bích, Phường Tân Thới Hòa, Quận Tân Phú, TP. Hồ Chí Minh",
      url: "https://datlich.alobo.vn/venue/demo1",
      pricing_tables: [
        [["Day", "Time", "Price"], ["Mon-Fri", "05h-18h", "80.000đ"], ["Mon-Fri", "18h-22h", "120.000đ"], ["Sat-Sun", "All day", "100.000đ"]]
      ],
      flat_prices: [],
      promotions: ["Buy 1hr get 1hr free 5am-3pm Mon-Fri"]
    },
    {
      name: "Pickleball Bình Thạnh Sport Center",
      address: "456 Đinh Bộ Lĩnh, Phường 26, Quận Bình Thạnh, TP. Hồ Chí Minh",
      url: "https://datlich.alobo.vn/venue/demo2",
      pricing_tables: [
        [["Session", "Regular", "Member"], ["Morning", "90.000đ", "70.000đ"], ["Evening", "130.000đ", "100.000đ"]]
      ],
      flat_prices: [],
      promotions: []
    },
    {
      name: "Quận 7 Pickleball Arena",
      address: "789 Nguyễn Thị Thập, Phường Tân Quy, Quận 7, TP. Hồ Chí Minh",
      url: "https://datlich.alobo.vn/venue/demo3",
      pricing_tables: [
        [["Time Slot", "Price"], ["All day weekday", "100.000đ"], ["Weekend", "120.000đ"]]
      ],
      flat_prices: [],
      promotions: ["10% off for members"]
    }
  ];
  loadVenues(demo);
}
</script>
</body>
</html>
