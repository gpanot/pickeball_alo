<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Courts - Vietnam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --acid: #C8F135;
    --dark: #0D0D0D;
    --mid: #1A1A1A;
    --panel: #111;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #666;
    --orange: #FF5B1F;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--acid);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--orange); }

  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: var(--muted);
  }

  .stat-val {
    color: var(--acid);
    font-weight: 700;
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 360px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--panel);
    overflow: hidden;
  }

  .search-bar {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .search-bar input {
    flex: 1;
    background: var(--mid);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    outline: none;
    border-radius: 2px;
  }

  .search-bar input:focus { border-color: var(--acid); }

  .sort-select {
    background: var(--mid);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    outline: none;
    cursor: pointer;
    border-radius: 2px;
  }

  .venue-list {
    overflow-y: auto;
    flex: 1;
  }

  .venue-list::-webkit-scrollbar { width: 4px; }
  .venue-list::-webkit-scrollbar-track { background: var(--dark); }
  .venue-list::-webkit-scrollbar-thumb { background: var(--border); }

  .venue-card {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .venue-card:hover { background: var(--mid); }
  .venue-card.active {
    background: var(--mid);
    border-left: 3px solid var(--acid);
  }

  .venue-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .venue-address {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .price-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .badge {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 2px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .badge-price {
    background: rgba(200, 241, 53, 0.12);
    color: var(--acid);
    border: 1px solid rgba(200, 241, 53, 0.2);
  }

  .badge-promo {
    background: rgba(255, 91, 31, 0.12);
    color: var(--orange);
    border: 1px solid rgba(255, 91, 31, 0.2);
  }

  .venue-link {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 10px;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .venue-link:hover {
    color: var(--acid);
    border-color: var(--acid);
  }

  .venue-card.hours-dim {
    opacity: 0.55;
  }

  .badge-warn {
    background: rgba(255, 91, 31, 0.15);
    color: var(--orange);
    border: 1px solid rgba(255, 91, 31, 0.35);
  }

  .badge-dist {
    background: rgba(255, 255, 255, 0.06);
    color: #999;
    border: 1px solid var(--border);
  }

  /* PLANNER */
  .planner {
    flex-shrink: 0;
    padding: 10px 12px 12px;
    border-bottom: 1px solid var(--border);
    max-height: 48vh;
    overflow-y: auto;
  }

  .planner::-webkit-scrollbar { width: 4px; }
  .planner::-webkit-scrollbar-thumb { background: var(--border); }

  .planner-section {
    margin-bottom: 12px;
  }

  .planner-section:last-child { margin-bottom: 0; }

  .planner-label {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .chip-row.scroll-x {
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }

  .chip-row.scroll-x::-webkit-scrollbar { height: 3px; }

  .chip {
    flex-shrink: 0;
    background: var(--mid);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    cursor: pointer;
    border-radius: 2px;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  .chip:hover {
    color: var(--text);
    border-color: #444;
  }

  .chip.active {
    background: rgba(200, 241, 53, 0.12);
    border-color: var(--acid);
    color: var(--acid);
    font-weight: 700;
  }

  .geo-btn {
    width: 100%;
    background: var(--mid);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    border-radius: 2px;
    margin-bottom: 6px;
  }

  .geo-btn:hover { border-color: var(--acid); color: var(--acid); }

  .geo-clear {
    display: block;
    width: 100%;
    text-align: center;
    font-size: 9px;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: 8px;
    text-decoration: underline;
  }

  .geo-clear:hover { color: var(--acid); }

  .geo-status {
    font-size: 9px;
    color: var(--muted);
    margin-bottom: 8px;
    min-height: 12px;
  }

  .range-label {
    display: block;
    font-size: 9px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .range-label span { color: var(--acid); font-weight: 700; }

  #radiusSlider {
    width: 100%;
    accent-color: var(--acid);
    margin-bottom: 4px;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 9px;
    color: var(--muted);
    cursor: pointer;
    margin-top: 8px;
    user-select: none;
  }

  .toggle-row input { accent-color: var(--acid); }

  /* MAP AREA */
  .map-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #map {
    flex: 1;
    background: #181818;
  }

  /* DETAIL PANEL */
  .detail-panel {
    height: 280px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    overflow-y: auto;
    padding: 16px 20px;
    flex-shrink: 0;
    display: none;
  }

  .detail-panel.open { display: block; }

  .detail-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .detail-addr {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .pricing-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    margin-bottom: 10px;
  }

  .pricing-table th {
    background: var(--mid);
    color: var(--acid);
    text-align: left;
    padding: 5px 10px;
    font-size: 10px;
    letter-spacing: 0.5px;
    border: 1px solid var(--border);
  }

  .pricing-table td {
    padding: 5px 10px;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .pricing-table tr:hover td { background: var(--mid); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }

  .empty-icon { font-size: 40px; opacity: 0.3; }

  /* FILE UPLOAD */
  .upload-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(4px);
  }

  .upload-box {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
  }

  .upload-box h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--acid);
    margin-bottom: 8px;
  }

  .upload-box p {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .upload-btn {
    display: inline-block;
    background: var(--acid);
    color: var(--dark);
    padding: 12px 28px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    border: none;
    letter-spacing: 0.5px;
    transition: opacity 0.15s;
  }

  .upload-btn:hover { opacity: 0.85; }

  .demo-btn {
    margin-top: 14px;
    display: block;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
  }

  #fileInput { display: none; }
</style>
<!-- Leaflet for map -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

<body>

<!-- Upload overlay -->
<div class="upload-overlay" id="uploadOverlay">
  <div class="upload-box">
    <h2>COURT<span style="color:var(--orange)">MAP</span></h2>
    <p>Load the courts.json file generated by the scraper to visualize pickleball venues on the map with pricing details.</p>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Load courts.json</button>
    <input type="file" id="fileInput" accept=".json">
    <span class="demo-btn" onclick="loadDemo()">or load demo data</span>
  </div>
</div>

<header>
  <div class="logo">COURT<span>MAP</span></div>
  <div style="font-size:10px; color:var(--muted)">Pickleball venues / Vietnam</div>
  <div class="header-stats">
    <div>VENUES <span class="stat-val" id="totalCount">0</span></div>
    <div>SHOWN <span class="stat-val" id="shownCount">0</span></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="planner" id="planner">
      <div class="planner-section">
        <div class="planner-label">When</div>
        <div class="chip-row scroll-x" id="dateChips" role="list"></div>
      </div>
      <div class="planner-section">
        <div class="planner-label">How long</div>
        <div class="chip-row" id="durationChips"></div>
      </div>
      <div class="planner-section">
        <div class="planner-label">Time of day</div>
        <div class="chip-row wrap" id="periodChips"></div>
      </div>
      <div class="planner-section">
        <div class="planner-label">Start time</div>
        <div class="chip-row" id="slotChips"></div>
      </div>
      <div class="planner-section">
        <div class="planner-label">Near me</div>
        <button type="button" class="geo-btn" id="geoBtn">Use my location</button>
        <span class="geo-clear" id="geoClear" style="display:none">Clear location</span>
        <div class="geo-status" id="geoStatus"></div>
        <label class="range-label">Radius <span id="radiusLabel">5</span> km</label>
        <input type="range" id="radiusSlider" min="1" max="10" value="5" step="1" />
      </div>
      <label class="toggle-row">
        <input type="checkbox" id="strictHours" />
        <span>Only venues open at this time</span>
      </label>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search name or district..." oninput="filterVenues()">
      <select class="sort-select" id="sortSelect" onchange="filterVenues()">
        <option value="name">A-Z</option>
        <option value="price_asc">Price low</option>
        <option value="price_desc">Price high</option>
        <option value="distance_asc">Nearest</option>
        <option value="cheap_nearby">Cheapest nearby</option>
      </select>
    </div>
    <div class="venue-list" id="venueList">
      <div class="empty-state">
        <div class="empty-icon">🏓</div>
        <div>Load courts.json to get started</div>
      </div>
    </div>
  </div>

  <div class="map-area">
    <div id="map"></div>
    <div class="detail-panel" id="detailPanel"></div>
  </div>
</div>

<script>
let allVenues = [];
let filteredVenues = [];
let map, markers = {};
let activeCard = null;
let userMarker = null;

/** Planner state: date is YYYY-MM-DD (local); times in minutes from midnight */
const planner = {
  dateISO: null,
  durationMin: 90,
  period: 'morning',
  slotStartMin: null,
  userLat: null,
  userLng: null,
  radiusKm: 5
};

const PERIOD_WINDOWS = {
  morning: [5 * 60, 12 * 60],
  noon: [11 * 60, 14 * 60],
  afternoon: [12 * 60, 19 * 60],
  night: [18 * 60, 24 * 60]
};

const DURATION_OPTIONS = [
  { min: 60, label: '1h' },
  { min: 90, label: '1h30' },
  { min: 120, label: '2h' },
  { min: 150, label: '2h30' },
  { min: 180, label: '3h' }
];

const PERIOD_LABELS = {
  morning: 'Morning',
  noon: 'Noon',
  afternoon: 'Afternoon',
  night: 'Night'
};

function localYMD(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatSlotMin(totalMin) {
  const h = Math.floor(totalMin / 60);
  const mm = totalMin % 60;
  return `${h}:${String(mm).padStart(2, '0')}`;
}

function computeSlots(periodStart, periodEnd, durationMin, stepMin = 30) {
  const slots = [];
  const lastStart = periodEnd - durationMin;
  if (lastStart < periodStart) return slots;
  for (let t = periodStart; t <= lastStart; t += stepMin) {
    if (t + durationMin <= periodEnd) slots.push(t);
  }
  return slots;
}

function getSlotsForPlanner() {
  const [a, b] = PERIOD_WINDOWS[planner.period] || PERIOD_WINDOWS.morning;
  return computeSlots(a, b, planner.durationMin, 30);
}

function syncSlotToValid() {
  const slots = getSlotsForPlanner();
  if (!slots.length) {
    planner.slotStartMin = PERIOD_WINDOWS[planner.period][0];
    return;
  }
  if (planner.slotStartMin == null || !slots.includes(planner.slotStartMin)) {
    planner.slotStartMin = slots[0];
  }
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const toR = x => (x * Math.PI) / 180;
  const dLat = toR(lat2 - lat1);
  const dLon = toR(lon2 - lon1);
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toR(lat1)) * Math.cos(toR(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

function tokenToMinutes(tok) {
  if (!tok) return null;
  let s = String(tok).trim().toLowerCase();
  const colon = s.match(/^(\d{1,2})\s*:\s*(\d{2})$/);
  if (colon) return parseInt(colon[1], 10) * 60 + parseInt(colon[2], 10);
  const hFormat = s.match(/^(\d{1,2})h(\d{2})$/);
  if (hFormat) return parseInt(hFormat[1], 10) * 60 + parseInt(hFormat[2], 10);
  const hOnly = s.match(/^(\d{1,2})h$/);
  if (hOnly) return parseInt(hOnly[1], 10) * 60;
  const hourOnly = s.match(/^(\d{1,2})$/);
  if (hourOnly) return parseInt(hourOnly[1], 10) * 60;
  return null;
}

function normalizeTimePart(part) {
  let p = String(part).trim().toLowerCase().replace(/h/g, ':');
  if (!p.includes(':')) return `${p}:00`;
  if (p.endsWith(':')) return `${p}00`;
  return p;
}

/** Parse first open-close range from hours string. Returns { open, close } in minutes or null. */
function parseVenueHours(str) {
  if (!str || typeof str !== 'string') return null;
  const m = str.match(
    /(\d{1,2}(?::\d{2}|h\d{0,2})?)\s*-\s*(\d{1,2}(?::\d{2}|h\d{0,2})?)/i
  );
  if (!m) return null;
  const open = tokenToMinutes(normalizeTimePart(m[1]));
  const close = tokenToMinutes(normalizeTimePart(m[2]));
  if (open == null || close == null) return null;
  if (close <= open) return null;
  return { open, close };
}

/** true = inside hours, false = outside, null = unknown */
function venueCoversSlot(venue, slotStartMin, durationMin) {
  const r = parseVenueHours(venue.hours);
  if (!r) return null;
  const end = slotStartMin + durationMin;
  return r.open <= slotStartMin && end <= r.close;
}

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderDateChips() {
  const el = document.getElementById('dateChips');
  if (!el) return;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  if (!planner.dateISO) planner.dateISO = localYMD(today);

  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const iso = localYMD(d);
    const dayName = d.toLocaleDateString(undefined, { weekday: 'short' });
    const md = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    const active = iso === planner.dateISO ? ' active' : '';
    html += `<button type="button" class="chip${active}" data-date="${iso}" title="${iso}">${esc(dayName)} ${esc(md)}</button>`;
  }
  el.innerHTML = html;
  el.querySelectorAll('.chip[data-date]').forEach(btn => {
    btn.addEventListener('click', () => {
      planner.dateISO = btn.getAttribute('data-date');
      renderDateChips();
      filterVenues();
    });
  });
}

function renderDurationChips() {
  const el = document.getElementById('durationChips');
  if (!el) return;
  el.innerHTML = DURATION_OPTIONS.map(
    o =>
      `<button type="button" class="chip${o.min === planner.durationMin ? ' active' : ''}" data-dur="${o.min}">${o.label}</button>`
  ).join('');
  el.querySelectorAll('.chip[data-dur]').forEach(btn => {
    btn.addEventListener('click', () => {
      planner.durationMin = parseInt(btn.getAttribute('data-dur'), 10);
      syncSlotToValid();
      renderDurationChips();
      renderSlotChips();
      filterVenues();
    });
  });
}

function renderPeriodChips() {
  const el = document.getElementById('periodChips');
  if (!el) return;
  el.innerHTML = Object.keys(PERIOD_WINDOWS)
    .map(
      key =>
        `<button type="button" class="chip${key === planner.period ? ' active' : ''}" data-period="${key}">${PERIOD_LABELS[key]}</button>`
    )
    .join('');
  el.querySelectorAll('.chip[data-period]').forEach(btn => {
    btn.addEventListener('click', () => {
      planner.period = btn.getAttribute('data-period');
      syncSlotToValid();
      renderPeriodChips();
      renderSlotChips();
      filterVenues();
    });
  });
}

function renderSlotChips() {
  syncSlotToValid();
  const el = document.getElementById('slotChips');
  if (!el) return;
  const slots = getSlotsForPlanner();
  if (!slots.length) {
    el.innerHTML =
      '<span style="font-size:9px;color:var(--muted)">No slot fits this duration in this window.</span>';
    return;
  }
  el.innerHTML = slots
    .map(
      m =>
        `<button type="button" class="chip${m === planner.slotStartMin ? ' active' : ''}" data-slot="${m}">${formatSlotMin(m)}</button>`
    )
    .join('');
  el.querySelectorAll('.chip[data-slot]').forEach(btn => {
    btn.addEventListener('click', () => {
      planner.slotStartMin = parseInt(btn.getAttribute('data-slot'), 10);
      renderSlotChips();
      filterVenues();
    });
  });
}

function setUserOnMap(lat, lng) {
  if (userMarker) {
    map.removeLayer(userMarker);
    userMarker = null;
  }
  userMarker = L.circleMarker([lat, lng], {
    radius: 9,
    color: '#C8F135',
    weight: 2,
    fillColor: '#C8F135',
    fillOpacity: 0.35
  }).addTo(map);
}

function clearUserLocation() {
  planner.userLat = null;
  planner.userLng = null;
  if (userMarker) {
    map.removeLayer(userMarker);
    userMarker = null;
  }
  const st = document.getElementById('geoStatus');
  const clr = document.getElementById('geoClear');
  if (st) st.textContent = '';
  if (clr) clr.style.display = 'none';
  filterVenues();
}

let plannerEventsBound = false;

function initPlannerControls() {
  if (!planner.dateISO) {
    const t = new Date();
    t.setHours(0, 0, 0, 0);
    planner.dateISO = localYMD(t);
  }
  syncSlotToValid();
  renderDateChips();
  renderDurationChips();
  renderPeriodChips();
  renderSlotChips();

  const slider = document.getElementById('radiusSlider');
  const label = document.getElementById('radiusLabel');
  if (slider && label) {
    slider.value = String(planner.radiusKm);
    label.textContent = String(planner.radiusKm);
  }

  if (plannerEventsBound) return;
  plannerEventsBound = true;

  if (slider && label) {
    slider.addEventListener('input', () => {
      planner.radiusKm = parseInt(slider.value, 10);
      label.textContent = String(planner.radiusKm);
      filterVenues();
    });
  }

  document.getElementById('geoBtn')?.addEventListener('click', () => {
    const st = document.getElementById('geoStatus');
    if (!navigator.geolocation) {
      if (st) st.textContent = 'Geolocation not supported';
      return;
    }
    if (st) st.textContent = 'Locating…';
    navigator.geolocation.getCurrentPosition(
      pos => {
        planner.userLat = pos.coords.latitude;
        planner.userLng = pos.coords.longitude;
        if (st) st.textContent = 'Using your location';
        const clr = document.getElementById('geoClear');
        if (clr) clr.style.display = 'block';
        setUserOnMap(planner.userLat, planner.userLng);
        filterVenues();
      },
      () => {
        if (st) st.textContent = 'Location denied or unavailable';
      },
      { enableHighAccuracy: true, timeout: 12000 }
    );
  });

  document.getElementById('geoClear')?.addEventListener('click', clearUserLocation);
  document.getElementById('strictHours')?.addEventListener('change', filterVenues);
}

// Init map centered on Ho Chi Minh City
map = L.map('map', { zoomControl: true }).setView([10.776, 106.700], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; CartoDB',
  maxZoom: 19
}).addTo(map);

// Custom marker icon
function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:28px; height:28px;
      background:${color};
      border:2px solid #000;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      box-shadow:0 2px 8px rgba(0,0,0,0.5);
    "></div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 28],
    popupAnchor: [0, -28]
  });
}

// Extract min price from venue data
function getMinPrice(venue) {
  let min = Infinity;
  const priceRe = /(\d[\d.,]+)\s*(?:đ|VND|vnđ|₫)/gi;
  const text = JSON.stringify(venue);
  let match;
  while ((match = priceRe.exec(text)) !== null) {
    const val = parseFloat(match[1].replace(/[.,]/g, ''));
    if (val > 10000 && val < 10000000) min = Math.min(min, val);
  }
  return min === Infinity ? null : min;
}

function formatPrice(p) {
  if (!p) return '';
  return (p / 1000).toFixed(0) + 'k';
}

function priceColor(p) {
  if (!p) return '#666';
  if (p <= 80000) return '#C8F135';
  if (p <= 120000) return '#FFD700';
  return '#FF5B1F';
}

// Geocode: try to extract lat/lng from address using known HCM districts
const DISTRICT_COORDS = {
  'tân phú': [10.788, 106.628], 'tan phu': [10.788, 106.628],
  'bình thạnh': [10.812, 106.712], 'binh thanh': [10.812, 106.712],
  'quận 1': [10.776, 106.702], 'district 1': [10.776, 106.702],
  'quận 2': [10.786, 106.742], 'thủ đức': [10.850, 106.757],
  'quận 3': [10.779, 106.690], 'quận 4': [10.760, 106.702],
  'quận 5': [10.754, 106.672], 'quận 6': [10.748, 106.638],
  'quận 7': [10.730, 106.718], 'phú nhuận': [10.800, 106.685],
  'quận 10': [10.773, 106.668], 'quận 11': [10.763, 106.651],
  'quận 12': [10.868, 106.654], 'gò vấp': [10.838, 106.673],
  'bình dương': [10.970, 106.650], 'đồng nai': [10.950, 107.000],
  'hà nội': [21.028, 105.834], 'ha noi': [21.028, 105.834],
  'đà nẵng': [16.054, 108.202], 'da nang': [16.054, 108.202],
};

function guessCoords(address) {
  if (!address) return null;
  const lower = address.toLowerCase();
  for (const [key, coords] of Object.entries(DISTRICT_COORDS)) {
    if (lower.includes(key)) {
      // Add small jitter so markers don't stack
      return [coords[0] + (Math.random() - 0.5) * 0.005, coords[1] + (Math.random() - 0.5) * 0.005];
    }
  }
  return null;
}

function loadVenues(data) {
  allVenues = data.map((v, i) => ({
    ...v,
    id: i,
    minPrice: getMinPrice(v),
    coords: (v.latitude && v.longitude) ? [v.latitude, v.longitude] : guessCoords(v.address)
  }));
  document.getElementById('uploadOverlay').style.display = 'none';
  document.getElementById('totalCount').textContent = allVenues.length;

  initPlannerControls();

  // Auto-fit map to all venues with coordinates
  const pts = allVenues.filter(v => v.coords).map(v => v.coords);
  if (pts.length) map.fitBounds(pts, { padding: [30, 30] });

  filterVenues();
}

function filterVenues() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  const strictHours = document.getElementById('strictHours')?.checked ?? false;
  const hasUser = planner.userLat != null && planner.userLng != null;
  const slotStart = planner.slotStartMin ?? 0;
  const durationMin = planner.durationMin;

  filteredVenues = allVenues.filter(v => {
    if (
      !(v.name || '').toLowerCase().includes(q) &&
      !(v.address || '').toLowerCase().includes(q)
    ) {
      return false;
    }

    if (hasUser) {
      if (!v.coords) return false;
      const d = haversineKm(planner.userLat, planner.userLng, v.coords[0], v.coords[1]);
      v._distanceKm = d;
      if (d > planner.radiusKm) return false;
    } else {
      if (v.coords) {
        v._distanceKm = null;
      } else {
        v._distanceKm = null;
      }
    }

    if (strictHours) {
      const cov = venueCoversSlot(v, slotStart, durationMin);
      if (cov === false) return false;
    }

    return true;
  });

  filteredVenues.sort((a, b) => {
    if (sort === 'name') return (a.name || '').localeCompare(b.name || '');
    if (sort === 'price_asc')
      return (a.minPrice || Infinity) - (b.minPrice || Infinity);
    if (sort === 'price_desc')
      return (b.minPrice || -Infinity) - (a.minPrice || -Infinity);
    if (sort === 'distance_asc') {
      const da = a._distanceKm != null ? a._distanceKm : Infinity;
      const db = b._distanceKm != null ? b._distanceKm : Infinity;
      if (da !== db) return da - db;
      return (a.minPrice || Infinity) - (b.minPrice || Infinity);
    }
    if (sort === 'cheap_nearby') {
      const pa = a.minPrice || Infinity;
      const pb = b.minPrice || Infinity;
      if (pa !== pb) return pa - pb;
      const da = a._distanceKm != null ? a._distanceKm : Infinity;
      const db = b._distanceKm != null ? b._distanceKm : Infinity;
      return da - db;
    }
    return 0;
  });

  document.getElementById('shownCount').textContent = filteredVenues.length;
  renderList();
  renderMarkers();
}

function renderList() {
  const list = document.getElementById('venueList');
  if (!filteredVenues.length) {
    list.innerHTML =
      '<div class="empty-state"><div class="empty-icon">🔍</div><div>No venues match</div></div>';
    return;
  }
  const hasUser = planner.userLat != null && planner.userLng != null;
  const slotStart = planner.slotStartMin ?? 0;
  const durationMin = planner.durationMin;

  list.innerHTML = filteredVenues
    .map(v => {
      const hoursFit = venueCoversSlot(v, slotStart, durationMin);
      const dim = hoursFit === false;
      const cardClass = dim ? 'venue-card hours-dim' : 'venue-card';
      const distBadge =
        hasUser && v._distanceKm != null
          ? `<span class="badge badge-dist">${v._distanceKm.toFixed(1)} km</span>`
          : '';
      const hoursBadge =
        hoursFit === false
          ? `<span class="badge badge-warn">outside listed hours</span>`
          : '';
      const url = esc(v.url || '#');
      const name = esc(v.name || 'Unnamed Venue');
      const addr = esc(v.address || 'Address unknown');
      return `
    <div class="${cardClass}" id="card-${v.id}" onclick="selectVenue(${v.id})">
      <a class="venue-link" href="${url}" target="_blank" rel="noopener">BOOK</a>
      <div class="venue-name">${name}</div>
      <div class="venue-address">${addr}</div>
      <div class="price-badges">
        ${v.minPrice ? `<span class="badge badge-price">from ${formatPrice(v.minPrice)}</span>` : ''}
        ${distBadge}
        ${hoursBadge}
        ${(v.promotions || []).length ? `<span class="badge badge-promo">PROMO</span>` : ''}
        ${!v.coords ? `<span class="badge" style="background:rgba(255,255,255,0.05);color:#555;border:1px solid #333">no GPS</span>` : ''}
      </div>
    </div>`;
    })
    .join('');
}

function renderMarkers() {
  // Clear old markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  filteredVenues.forEach(v => {
    if (!v.coords) return;
    const color = priceColor(v.minPrice);
    const marker = L.marker(v.coords, { icon: makeIcon(color) }).addTo(map);
    marker.bindPopup(`
      <div style="font-family:monospace;font-size:12px;min-width:180px">
        <b>${esc(v.name || 'Venue')}</b><br>
        <span style="color:#999;font-size:10px">${esc(v.address || '')}</span><br>
        ${v.minPrice ? `<span style="color:${color};font-weight:bold">From ${formatPrice(v.minPrice)}/hr</span>` : ''}
        ${(v.promotions || []).length ? `<br><span style="color:#FF5B1F;font-size:10px">${v.promotions[0]}</span>` : ''}
        <br><a href="${v.url}" target="_blank" style="color:#C8F135;font-size:10px">Book now</a>
      </div>
    `);
    marker.on('click', () => selectVenue(v.id));
    markers[v.id] = marker;
  });
}

function selectVenue(id) {
  const venue = allVenues.find(v => v.id === id);
  if (!venue) return;

  // Highlight card
  if (activeCard) {
    const prev = document.getElementById(`card-${activeCard}`);
    if (prev) prev.classList.remove('active');
  }
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  activeCard = id;

  // Pan map
  if (venue.coords && markers[id]) {
    map.panTo(venue.coords);
    markers[id].openPopup();
  }

  // Show detail panel
  showDetail(venue);
}

function showDetail(venue) {
  const panel = document.getElementById('detailPanel');
  panel.classList.add('open');

  // Meta line: hours, phone, rating
  let metaParts = [];
  if (venue.hours) metaParts.push(`🕐 ${venue.hours}`);
  if (venue.phone) metaParts.push(`📞 ${venue.phone}`);
  if (venue.rating) metaParts.push(`⭐ ${venue.rating} (${venue.ratingCount})`);
  if (venue.hasVoucher) metaParts.push(`🎟️ Voucher`);
  const metaHtml = metaParts.length
    ? `<div style="font-size:10px;color:var(--muted);margin-bottom:10px">${metaParts.join(' &nbsp;·&nbsp; ')}</div>`
    : '';

  let tablesHtml = '';
  if (venue.pricing_tables && venue.pricing_tables.length) {
    venue.pricing_tables.forEach((table, idx) => {
      if (!table.length) return;
      const tableName = (venue.pricing_table_names && venue.pricing_table_names[idx]) || '';
      const headers = table[0];
      const rows = table.slice(1);
      tablesHtml += `
        ${tableName ? `<div style="font-size:11px;font-weight:700;color:var(--acid);margin:8px 0 4px;font-family:'Syne',sans-serif">${tableName}</div>` : ''}
        <table class="pricing-table">
          <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>`;
    });
  } else if (venue.flat_prices && venue.flat_prices.length) {
    tablesHtml = venue.flat_prices.map(p => `<div style="font-size:11px;color:#aaa;margin-bottom:4px">${p}</div>`).join('');
  } else {
    tablesHtml = '<div style="font-size:11px;color:#555">No pricing data extracted. Click BOOK to view on site.</div>';
  }

  const promos = (venue.promotions || []).map(p =>
    `<div style="font-size:10px;color:var(--orange);margin-top:4px">🎁 ${p}</div>`
  ).join('');

  const planHint =
    planner.dateISO != null && planner.slotStartMin != null
      ? `<div style="font-size:10px;color:var(--acid);margin-bottom:8px;opacity:0.9">Plan: ${esc(planner.dateISO)} · start ${formatSlotMin(planner.slotStartMin)} · ${planner.durationMin} min (static data — confirm on site)</div>`
      : '';

  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
      <div>
        <div class="detail-title">${esc(venue.name || 'Venue')}</div>
        <div class="detail-addr">${esc(venue.address || 'Address not found')}</div>
      </div>
      <a href="${venue.url}" target="_blank" style="
        background:var(--acid);color:var(--dark);padding:8px 16px;
        font-family:monospace;font-size:11px;font-weight:700;text-decoration:none;
        flex-shrink:0;margin-left:16px;
      ">BOOK NOW</a>
    </div>
    ${planHint}
    ${metaHtml}
    ${tablesHtml}
    ${promos}
  `;
}

// File input handler
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      loadVenues(Array.isArray(data) ? data : [data]);
    } catch {
      alert('Invalid JSON file. Make sure to load courts.json from the scraper.');
    }
  };
  reader.readAsText(file);
});

// Load courts.json from same directory
function loadDemo() {
  fetch('courts.json')
    .then(r => { if (!r.ok) throw new Error('courts.json not found'); return r.json(); })
    .then(data => loadVenues(Array.isArray(data) ? data : [data]))
    .catch(() => alert('Place courts.json in the same folder as this HTML file.'));
}

initPlannerControls();

// Auto-load if courts.json exists
fetch('courts.json').then(r => { if (r.ok) return r.json(); }).then(data => {
  if (data) loadVenues(Array.isArray(data) ? data : [data]);
}).catch(e => console.error('Auto-load failed:', e));
</script>
